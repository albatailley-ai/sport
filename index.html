<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programmes sport</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: #0f1115;
    color: #f4f4f5;
    padding: 24px;
  }
  h1 { font-size: 26px; letter-spacing: -0.5px; }
  p { color: #a1a1aa; font-size: 14px; }
  .cards { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  a.card {
    display: block;
    text-decoration: none;
    color: #fff;
    padding: 28px 40px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 700;
    min-width: 200px;
    text-align: center;
    transition: transform .15s ease;
  }
  a.card:hover { transform: translateY(-3px); }
  .alex  { background: linear-gradient(135deg, #f97316, #ef4444); }
  .sarah { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
  .sub { display: block; font-size: 12px; font-weight: 500; opacity: .85; margin-top: 4px; }
</style>
</head>
<body>
  <h1>🏋️ Programmes sport</h1>
  <p>Choisis ton programme — la progression est synchronisée dans le cloud.</p>
  <div class="cards">
    <a class="card alex" href="programme-Alex.html">Alex<span class="sub">Programme 2 mois</span></a>
    <a class="card sarah" href="programme-sarah.html">Sarah<span class="sub">Programme</span></a>
  </div>
</body>
</html>
